[build]
  # どの階層から実行されても storefront をビルドするように明示
  command = "npm run build -w storefront"
  # モノレポ構成では、ルートからの相対パスを指定するのが最も安全です
  publish = "apps/storefront/.next"
  ignore = "git diff --quiet HEAD^ HEAD . ../../packages/shared"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
